include:
  - .gitlab/dotnet.yml
  - .gitlab/java.yml
  - .gitlab/node.yml

variables:
  RUNTIME:
    description: "Runtime of the extension to deploy"
  VERSION:
    description: "Version of the extension to deploy. Ex. 1.0.0"
  AGENT_BRANCH:
    description: "Optional. datadog-agent branch (e.g. 'somebody/my-feature'). When set with RUNTIME=node, fetch-agent-binaries-node pulls the agent zip from that branch's latest successful windows_zip_agent_binaries_x64-a7 build (via gitlab_pat in vault) and the node build uses it instead of the default dsd6-staging zip."
